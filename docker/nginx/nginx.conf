server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Minimal APIs use full paths (e.g. /api/v1/auth/login). Do not use
    # proxy_pass http://api:5000/; with location /api/ — that strips the /api
    # prefix and upstream receives /v1/..., which does not match route groups.
    location ^~ /api {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
    }

    location ^~ /openapi {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
    }

    location ^~ /scalar {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
    }

    location ^~ /hangfire {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
    }

    location ^~ /health {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
    }

    # SignalR WebSocket hub (real-time messaging)
    location ^~ /hubs {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /business/ {
        proxy_pass http://business-app:4200/;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://client-app:4200/;
        proxy_http_version 1.1;
    }
}
