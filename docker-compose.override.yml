services:
  api:
    build: !reset
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: clientportal-api-dev
    working_dir: /src/src/Api
    command: >
      sh -c "dotnet restore Api.csproj &&
             dotnet run --no-launch-profile --urls http://0.0.0.0:5000"
    volumes:
      - ./:/src
      # Hide Win-mounted bin/obj so Linux MSBuild can write outputs (fixes Access denied / 502 → Scalar).
      - /src/src/Api/bin
      - /src/src/Api/obj
      - /src/src/Application/bin
      - /src/src/Application/obj
      - /src/src/Domain/bin
      - /src/src/Domain/obj
      - /src/src/Infrastructure/bin
      - /src/src/Infrastructure/obj
      - /src/src/Shared/bin
      - /src/src/Shared/obj
      - ${USERPROFILE}/.nuget/packages:/root/.nuget/packages
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${USERPROFILE}/.aspnet/https:/https:ro
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      # Build from POSTGRES_* so a host-level ConnectionStrings__Postgres env var cannot override .env (Compose: shell wins over .env).
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
      Jwt__Issuer: ${Jwt__Issuer:-client-portal}
      Jwt__Audience: ${Jwt__Audience:-client-portal-api}
      Jwt__PrivateKeyPem: ${Jwt__PrivateKeyPem}
      Jwt__PublicKeyPem: ${Jwt__PublicKeyPem}

  client-app:
    build: !reset
    image: node:22-alpine
    container_name: clientportal-client-app-dev
    working_dir: /workspace/client-portal
    command: >
      sh -c "npm install &&
             npm run start -- --host 0.0.0.0 --port 4200 --poll 2000"
    volumes:
      - ./frontend:/workspace
      - /workspace/client-portal/node_modules
    environment:
      NODE_ENV: ${NODE_ENV_DEVELOPMENT}

  business-app:
    build: !reset
    image: node:22-alpine
    container_name: clientportal-business-app-dev
    working_dir: /workspace/business-portal
    command: >
      sh -c "npm install &&
             npm run start -- --host 0.0.0.0 --port 4200 --poll 2000"
    volumes:
      - ./frontend:/workspace
      - /workspace/business-portal/node_modules
    environment:
      NODE_ENV: ${NODE_ENV_DEVELOPMENT}
