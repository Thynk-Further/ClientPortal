services:
  postgres:
    image: postgres:16-alpine
    container_name: clientportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clientportal}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-clientportal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - clientportal-network

  redis:
    image: redis:7-alpine
    container_name: clientportal-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clientportal-network

  seq:
    image: datalust/seq:latest
    container_name: clientportal-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    networks:
      - clientportal-network

  minio:
    image: minio/minio:latest
    container_name: clientportal-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - clientportal-network

  minio-init:
    image: minio/mc:latest
    container_name: clientportal-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ALIAS: ${MINIO_ALIAS:-local}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-clientportal-files}
    volumes:
      - ./docker/minio/create-buckets.sh:/scripts/create-buckets.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - tr -d '\r' < /scripts/create-buckets.sh | /bin/sh
    restart: "no"
    networks:
      - clientportal-network

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: clientportal-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${POSTGRES_DB:-clientportal};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD:-app_password}
      REDIS_CONNECTION: redis:6379
      SEQ_SERVER_URL: http://seq:5341
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-clientportal-files}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "5000:5000"
    networks:
      - clientportal-network

  client-app:
    build:
      context: ./frontend
      dockerfile: client-portal/Dockerfile
    container_name: clientportal-client-app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - "4200:4200"
    networks:
      - clientportal-network

  business-app:
    build:
      context: ./frontend
      dockerfile: business-portal/Dockerfile
    container_name: clientportal-business-app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - "4201:4200"
    networks:
      - clientportal-network

  nginx:
    image: nginx:1.27-alpine
    container_name: clientportal-nginx
    restart: unless-stopped
    depends_on:
      - api
      - client-app
      - business-app
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - clientportal-network

volumes:
  postgres_data:
  redis_data:
  seq_data:
  minio_data:

networks:
  clientportal-network:
    driver: bridge
